<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events - CommuLink</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="Events.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">CommuLink</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="home.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="events.html">Events</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="profile.html">Profile</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Events Page -->
  <section class="events-page py-5">
    <div class="container">
      <h2 class="text-center mb-5">Forum for Events</h2>

      <!-- Registered Events Section -->
      <div class="mb-5">
        <h3 class="mb-4">Events</h3>
        <div class="row" id="registered-events">
          <!-- Registered events will be dynamically added here -->
        </div>
      </div>

      <!-- Upcoming Events Section -->
      <div class="mb-5">
        <h3 class="mb-4">Upcoming Community Events</h3>
        <div class="row" id="upcoming-events">
          <!-- Upcoming events will be dynamically added here -->
        </div>
      </div>

      <!-- Calendar Section -->
      <div class="mb-5">
        <h3 class="mb-4">Event Calendar</h3>
        <div class="card p-4">
          <div id="calendar"></div>
        </div>
      </div>

      <!-- Create Your Own Event Section -->
      <div class="mb-5">
        <h3 class="mb-4">Create Your Own Event</h3>
        <div class="card p-4">
          <form id="create-event-form">
            <div class="mb-3">
              <label for="event-title" class="form-label">Event Title</label>
              <input type="text" class="form-control" id="event-title" placeholder="Enter event title" required>
            </div>
            <div class="mb-3">
              <label for="event-date" class="form-label">Event Date</label>
              <input type="date" class="form-control" id="event-date" required>
            </div>
            <div class="mb-3">
              <label for="event-description" class="form-label">Event Description</label>
              <textarea class="form-control" id="event-description" rows="3" placeholder="Enter event description" required></textarea>
            </div>
            <div class="mb-3">
              <label for="event-tags" class="form-label">Tags (comma-separated)</label>
              <input type="text" class="form-control" id="event-tags" placeholder="e.g., yoga, fitness, community">
            </div>
            <button type="submit" class="btn btn-primary">Create Event</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer bg-dark text-white py-4">
    <div class="container text-center">
      <p class="mb-0">&copy; 2025 CommuLink. All rights reserved.</p>
    </div>
  </footer>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>
  <!-- Custom JS -->
  <script src="Events.js"></script>
</body>
</html>
